name: CI
on: pull_request
jobs:
  test:
    name: Unit Tests
    timeout-minutes: 3
    runs-on: ubuntu-latest
    steps:
      - uses: Brightspace/third-party-actions@actions/checkout
      - uses: Brightspace/setup-node@main
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Unit Tests
        run: npm run test
